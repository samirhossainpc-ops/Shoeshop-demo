<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product – ShoeHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--p:#FF6B00;--pd:#d95900;--bg:#fff;--surf:#F7F7F7;--bdr:#EBEBEB;--tx:#0D0D0D;--txm:#666;--r:12px;--rs:8px;--sh:0 4px 20px rgba(0,0,0,.09);--nh:60px;--bnh:64px;--font:'Inter',sans-serif}
    html{scroll-behavior:smooth}
    body{font-family:var(--font);background:var(--bg);color:var(--tx);line-height:1.5;-webkit-font-smoothing:antialiased}
    img{max-width:100%;display:block}a{text-decoration:none;color:inherit}button{font-family:var(--font);cursor:pointer;border:none;background:none}

    /* NAVBAR */
    .navbar{position:sticky;top:0;z-index:200;background:var(--bg);border-bottom:1px solid var(--bdr);height:var(--nh);display:flex;align-items:center;justify-content:space-between;padding:0 16px}
    .nav-logo{font-size:1.45rem;font-weight:900;letter-spacing:-.6px}.nav-logo span{color:var(--p)}
    .nav-actions{display:flex;align-items:center;gap:2px}
    .nav-btn{padding:8px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;transition:background .15s;position:relative;color:var(--tx)}
    .nav-btn:hover{background:var(--surf)}
    .c-bdg{position:absolute;top:1px;right:1px;background:var(--p);color:#fff;font-size:.58rem;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 3px;pointer-events:none}

    /* BREADCRUMB */
    .bc{padding:10px 16px;font-size:.78rem;color:var(--txm);max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .bc a{color:var(--txm);transition:color .15s}.bc a:hover{color:var(--p)}
    .bc-sep{color:#ccc}

    /* PRODUCT LAYOUT */
    .prod-wrap{max-width:1100px;margin:0 auto;padding:8px 16px 24px}
    @media(min-width:700px){.prod-wrap{display:grid;grid-template-columns:1fr 1fr;gap:40px;padding:16px 24px 40px;align-items:start}}

    /* GALLERY */
    .gallery{margin-bottom:16px}
    .gal-main{aspect-ratio:1/1;background:var(--surf);border-radius:var(--r);overflow:hidden;margin-bottom:10px;position:relative}
    .gal-main img{width:100%;height:100%;object-fit:cover;transition:opacity .2s}
    .gal-badge{position:absolute;top:10px;left:10px;background:var(--p);color:#fff;font-size:.62rem;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase}
    .gal-badge.sold{background:#888}
    .gal-thumbs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
    .gal-thumbs::-webkit-scrollbar{display:none}
    .thumb{flex:0 0 64px;width:64px;height:64px;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid var(--bdr);transition:border-color .15s;background:var(--surf)}
    .thumb.on,.thumb:hover{border-color:var(--p)}
    .thumb img{width:100%;height:100%;object-fit:cover}

    /* PRODUCT INFO */
    .prod-info{padding-bottom:100px}
    @media(min-width:700px){.prod-info{padding-bottom:20px}}
    .p-cat{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--p);margin-bottom:8px}
    .p-name{font-size:1.5rem;font-weight:800;line-height:1.2;letter-spacing:-.3px;margin-bottom:12px}
    .p-pricing{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
    .p-price{font-size:1.55rem;font-weight:900;color:var(--p)}
    .p-ori{font-size:1rem;color:#bbb;text-decoration:line-through}
    .p-disc{background:#ffeded;color:#c00;font-size:.75rem;font-weight:700;padding:4px 10px;border-radius:20px}

    /* SIZE SELECTOR */
    .p-label{font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txm);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
    .p-label a{color:var(--p);font-size:.78rem;text-transform:none;letter-spacing:0;font-weight:600}
    .sizes{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
    .sz{min-width:46px;height:46px;padding:0 10px;border-radius:var(--rs);border:2px solid var(--bdr);font-size:.88rem;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
    .sz:hover{border-color:var(--p);color:var(--p)}
    .sz.on{background:var(--p);border-color:var(--p);color:#fff}
    .sz.oos{opacity:.35;cursor:not-allowed;text-decoration:line-through}
    .size-err{color:#c00;font-size:.8rem;margin-top:-14px;margin-bottom:14px;display:none}

    /* QTY */
    .qty-row{display:flex;align-items:center;gap:16px;margin-bottom:22px}
    .qty-ctrl{display:flex;align-items:center;gap:0;border:2px solid var(--bdr);border-radius:var(--rs);overflow:hidden}
    .qty-btn{width:40px;height:40px;font-size:1.1rem;font-weight:700;background:#fff;border:none;cursor:pointer;transition:background .15s;color:var(--tx)}
    .qty-btn:hover{background:var(--surf)}
    .qty-num{width:44px;text-align:center;font-size:.95rem;font-weight:700;height:40px;display:flex;align-items:center;justify-content:center;background:#fff;border-left:2px solid var(--bdr);border-right:2px solid var(--bdr)}

    /* CTA BUTTONS */
    .cta-row{display:flex;gap:10px;margin-bottom:20px}
    .btn-add{flex:1;padding:14px;background:var(--p);color:#fff;border-radius:var(--rs);font-weight:700;font-size:.95rem;border:none;cursor:pointer;transition:background .18s,transform .1s}
    .btn-add:hover{background:var(--pd)}.btn-add:active{transform:scale(.98)}
    .btn-buy{flex:1;padding:14px;background:#0D0D0D;color:#fff;border-radius:var(--rs);font-weight:700;font-size:.95rem;border:none;cursor:pointer;transition:background .18s}
    .btn-buy:hover{background:#333}

    /* TRUST BADGES */
    .trust-badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
    .tbadge{display:flex;align-items:center;gap:6px;background:var(--surf);border-radius:var(--rs);padding:8px 12px;font-size:.77rem;font-weight:600;color:var(--txm)}
    .tbadge .ic{font-size:1rem}

    /* DESCRIPTION */
    .prod-tabs{border-top:1px solid var(--bdr);margin-bottom:20px}
    .tab-hd{width:100%;padding:14px 0;text-align:left;font-size:.88rem;font-weight:700;display:flex;justify-content:space-between;align-items:center;cursor:pointer;color:var(--tx);background:none;border:none;border-bottom:1px solid var(--bdr)}
    .tab-hd .arr{font-size:1rem;transition:transform .2s;display:inline-block}
    .tab-hd.open .arr{transform:rotate(180deg)}
    .tab-body{display:none;padding:14px 0;font-size:.85rem;color:var(--txm);line-height:1.7}
    .tab-body.open{display:block}
    .feat-list{list-style:none;padding:0}
    .feat-list li{padding:5px 0;display:flex;align-items:flex-start;gap:8px}
    .feat-list li::before{content:'✓';color:var(--p);font-weight:700;flex-shrink:0;margin-top:1px}

    /* RELATED PRODUCTS */
    .rel-sec{max-width:1100px;margin:0 auto;padding:24px 16px;border-top:1px solid var(--bdr)}
    .rel-sec h3{font-size:1.1rem;font-weight:800;margin-bottom:16px}
    .rgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    @media(min-width:580px){.rgrid{grid-template-columns:repeat(4,1fr)}}
    .pcard{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .15s}
    .pcard:hover{box-shadow:var(--sh);transform:translateY(-3px)}
    .pc-img{position:relative;aspect-ratio:1/1;overflow:hidden;background:var(--surf)}
    .pc-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
    .pcard:hover .pc-img img{transform:scale(1.05)}
    .pc-info{padding:9px 10px 10px}
    .pc-nm{font-size:.8rem;font-weight:600;line-height:1.3;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .pc-pr2{font-size:.88rem;font-weight:800;color:var(--p)}

    /* MOBILE STICKY BAR */
    .sticky-bar{display:flex;position:fixed;bottom:var(--bnh);left:0;right:0;z-index:150;background:#fff;border-top:1px solid var(--bdr);padding:10px 16px;gap:10px;align-items:center;box-shadow:0 -4px 16px rgba(0,0,0,.07)}
    @media(min-width:600px){.sticky-bar{display:none}}
    .sticky-price{font-size:1.1rem;font-weight:900;color:var(--p);white-space:nowrap}
    .sticky-add{flex:1;padding:12px;background:var(--p);color:#fff;border-radius:var(--rs);font-weight:700;font-size:.9rem;border:none;cursor:pointer;transition:background .18s}
    .sticky-add:hover{background:var(--pd)}

    /* FOOTER */
    footer{background:#0D0D0D;color:rgba(255,255,255,.6);padding:28px 16px 80px}
    @media(min-width:600px){footer{padding-bottom:28px}}
    .f-wrap{max-width:1100px;margin:0 auto}
    .f-logo{font-size:1.3rem;font-weight:900;color:#fff;margin-bottom:4px}.f-logo span{color:var(--p)}
    .f-links{display:flex;flex-wrap:wrap;gap:10px 20px;margin:12px 0}
    .f-links a{font-size:.8rem;color:rgba(255,255,255,.6);transition:color .2s}.f-links a:hover{color:var(--p)}
    .f-copy{font-size:.73rem;border-top:1px solid rgba(255,255,255,.1);padding-top:12px;margin-top:12px}

    /* BOTTOM NAV */
    .bnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:200;background:#fff;border-top:1px solid var(--bdr);height:var(--bnh)}
    @media(min-width:600px){.bnav{display:none}}
    .bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:.6rem;font-weight:600;color:#999;transition:color .15s;position:relative;padding:6px 2px}
    .bn.on,.bn:hover{color:var(--p)}.bn-ic{font-size:1.1rem}
    .bn-bdg{position:absolute;top:4px;left:50%;margin-left:4px;background:var(--p);color:#fff;font-size:.53rem;font-weight:700;min-width:14px;height:14px;border-radius:7px;display:none;align-items:center;justify-content:center;padding:0 3px}

    /* TOAST */
    .toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(10px);background:#111;color:#fff;padding:10px 22px;border-radius:50px;font-size:.82rem;font-weight:600;opacity:0;transition:opacity .25s,transform .25s;z-index:999;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(min-width:600px){.toast{bottom:24px}}

    /* LOADING/ERROR */
    .pg-load{text-align:center;padding:80px 20px;color:var(--txm)}
    .pg-err{text-align:center;padding:60px 20px;color:#c00}
    .pg-err a{color:var(--p);font-weight:700}
    .sk{background:linear-gradient(90deg,#efefef 25%,#e3e3e3 50%,#efefef 75%);background-size:200% 100%;animation:shim 1.3s infinite;border-radius:var(--r)}
    @keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="nav-logo">Shoe<span>Hub</span></a>
  <div class="nav-actions">
    <a href="index.html" class="nav-btn" aria-label="Back to shop">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </a>
    <a href="cart.html" class="nav-btn" aria-label="Cart">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="c-bdg" id="cBdg"></span>
    </a>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div id="mainContent"><div class="pg-load">Loading product…</div></div>

<!-- FOOTER -->
<footer>
  <div class="f-wrap">
    <div class="f-logo">Shoe<span>Hub</span></div>
    <div class="f-links">
      <a href="index.html">Home</a><a href="cart.html">Cart</a><a href="track.html">Track Order</a>
    </div>
    <p class="f-copy">© 2025 ShoeHub. All rights reserved.</p>
  </div>
</footer>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <a href="index.html" class="bn"><span class="bn-ic">🏠</span>Home</a>
  <a href="index.html#shop" class="bn"><span class="bn-ic">👟</span>Shop</a>
  <a href="cart.html" class="bn"><span class="bn-ic">🛒</span>Cart<span class="bn-bdg" id="bnBdg"></span></a>
  <a href="track.html" class="bn"><span class="bn-ic">📦</span>Track</a>
</nav>

<div class="toast" id="toast"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbwxOV8pQxrFupC8cR0ZxKPLLoOjZEq3hCBWioUt_Si6-QW0vAsHXDGHb2gkHB3puZun/exec';
const pid=new URLSearchParams(location.search).get('id');
let curProd=null,selSize='',qty=1,allP=[];

/* CART */
const gc=()=>{try{return JSON.parse(localStorage.getItem('sh_cart')||'[]')}catch(e){return[]}};
const sc=c=>localStorage.setItem('sh_cart',JSON.stringify(c));
function updBadge(){
  const n=gc().reduce((s,i)=>s+i.qty,0);
  const b1=document.getElementById('cBdg'),b2=document.getElementById('bnBdg');
  if(n>0){b1.textContent=n>99?'99+':n;b1.style.display='flex';b2.textContent=n>99?'99+':n;b2.style.display='flex'}
  else{b1.style.display='none';b2.style.display='none'}
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

/* IMG HELPERS */
function getImgs(p){
  if(p.images&&Array.isArray(p.images)&&p.images.length)return p.images.filter(u=>u);
  if(typeof p.image==='string'&&p.image)return p.image.split(',').map(u=>u.trim()).filter(u=>u);
  return[];
}
function getImg(p){const imgs=getImgs(p);return imgs[0]||'https://via.placeholder.com/500x500?text=No+Image'}
const isOOS=p=>p.stock!=null&&p.stock!==undefined&&p.stock<=0;
const isLow=p=>p.stock!=null&&p.stock!==undefined&&p.stock>0&&p.stock<=5;

/* SWITCH GALLERY IMAGE */
function switchImg(src,el){
  document.getElementById('mainImg').src=src;
  document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
}

/* SIZE SELECT */
function selectSize(s,el){
  selSize=s;
  document.querySelectorAll('.sz').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('sizeErr').style.display='none';
}

/* QTY */
function changeQty(delta){
  qty=Math.max(1,qty+delta);
  document.getElementById('qtyNum').textContent=qty;
}

/* ADD TO CART */
function doAdd(buyNow=false){
  if(!curProd)return;
  const sizes=Array.isArray(curProd.sizes)?curProd.sizes:(curProd.sizes?String(curProd.sizes).split(',').map(s=>s.trim()):[]);
  if(sizes.length>0&&!selSize){
    const e=document.getElementById('sizeErr');e.style.display='block';
    document.getElementById('sizeErr').textContent='Please select a size first';
    return;
  }
  const cart=gc();
  const ex=cart.find(i=>i.id===curProd.id&&i.size===selSize);
  if(ex)ex.qty+=qty;
  else cart.push({id:curProd.id,name:curProd.name,price:curProd.price,image:getImg(curProd),size:selSize,category:curProd.category,qty});
  sc(cart);updBadge();
  if(buyNow)location.href='cart.html';
  else showToast('Added to cart 🛒');
}

/* TOGGLE TAB */
function toggleTab(id,hd){
  const body=document.getElementById(id);
  const isOpen=body.classList.toggle('open');
  hd.classList.toggle('open',isOpen);
}

/* RENDER PRODUCT */
function renderProduct(p){
  curProd=p;
  document.title=p.name+' – ShoeHub';
  const imgs=getImgs(p);
  const mainImg=imgs[0]||'https://via.placeholder.com/500x500?text=No+Image';
  const sizes=Array.isArray(p.sizes)?p.sizes:(p.sizes?String(p.sizes).split(',').map(s=>s.trim()).filter(s=>s):[]);
  const oos=isOOS(p),low=isLow(p);
  const disc=p.originalPrice?Math.round((1-p.price/p.originalPrice)*100):0;
  const feats=Array.isArray(p.features)?p.features:(p.features?String(p.features).split('|').map(f=>f.trim()).filter(f=>f):[]);

  document.getElementById('mainContent').innerHTML=`
    <div class="bc">
      <a href="index.html">Home</a><span class="bc-sep">›</span>
      <a href="index.html">${p.category||'Products'}</a><span class="bc-sep">›</span>
      <span>${p.name}</span>
    </div>

    <div class="prod-wrap">
      <!-- GALLERY -->
      <div class="gallery">
        <div class="gal-main">
          <img id="mainImg" src="${mainImg}" alt="${p.name}" loading="eager">
          ${p.badge&&!oos?`<div class="gal-badge">${p.badge}</div>`:''}
          ${oos?'<div class="gal-badge sold">Out of Stock</div>':''}
        </div>
        ${imgs.length>1?`<div class="gal-thumbs">${imgs.map((u,i)=>`<div class="thumb${i===0?' on':''}" onclick="switchImg('${u}',this)"><img src="${u}" alt="View ${i+1}" loading="lazy"></div>`).join('')}</div>`:''}
      </div>

      <!-- INFO -->
      <div class="prod-info">
        <p class="p-cat">${p.category||''}</p>
        <h1 class="p-name">${p.name}</h1>
        <div class="p-pricing">
          <span class="p-price">৳${Number(p.price).toLocaleString()}</span>
          ${p.originalPrice?`<span class="p-ori">৳${Number(p.originalPrice).toLocaleString()}</span>`:''}
          ${disc>=5?`<span class="p-disc">-${disc}% OFF</span>`:''}
        </div>
        ${low&&!oos?`<p style="color:#c00;font-size:.82rem;font-weight:700;margin-bottom:14px;background:#ffeded;padding:8px 12px;border-radius:var(--rs)">⚡ Only ${p.stock} items left in stock!</p>`:''}
        ${oos?`<p style="color:#888;font-size:.85rem;font-weight:700;margin-bottom:14px;background:var(--surf);padding:8px 12px;border-radius:var(--rs)">⚠ Currently out of stock</p>`:''}

        ${sizes.length>0?`
        <div>
          <p class="p-label">Select Size <a href="#">Size Guide ↗</a></p>
          <div class="sizes">${sizes.map(s=>`<button class="sz" onclick="selectSize('${s}',this)">${s}</button>`).join('')}</div>
          <p class="size-err" id="sizeErr">Please select a size</p>
        </div>`:''}

        <div class="qty-row">
          <p class="p-label" style="margin:0">Quantity</p>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <div class="qty-num" id="qtyNum">1</div>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
        </div>

        ${!oos?`<div class="cta-row">
          <button class="btn-add" onclick="doAdd(false)">🛒 Add to Cart</button>
          <button class="btn-buy" onclick="doAdd(true)">Buy Now →</button>
        </div>`:`<button class="btn-add" disabled style="background:#ccc;cursor:not-allowed;border-radius:var(--rs);padding:14px;font-weight:700;width:100%;margin-bottom:20px">Out of Stock</button>`}

        <div class="trust-badges">
          <div class="tbadge"><span class="ic">💳</span>Cash on Delivery</div>
          <div class="tbadge"><span class="ic">🔄</span>7-Day Exchange</div>
          <div class="tbadge"><span class="ic">🚚</span>Fast Delivery</div>
          <div class="tbadge"><span class="ic">✅</span>100% Original</div>
        </div>

        <div class="prod-tabs">
          ${feats.length>0?`
          <button class="tab-hd open" onclick="toggleTab('featBody',this)">Features & Details <span class="arr">▼</span></button>
          <div class="tab-body open" id="featBody">
            <ul class="feat-list">${feats.map(f=>`<li>${f}</li>`).join('')}</ul>
          </div>`:''}
          <button class="tab-hd" onclick="toggleTab('shipBody',this)">Shipping & Exchange <span class="arr">▼</span></button>
          <div class="tab-body" id="shipBody">
            <p>• Free delivery across Bangladesh</p><br>
            <p>• Cash on Delivery available on all orders</p><br>
            <p>• 7-day easy exchange if size doesn't fit</p><br>
            <p>• Delivery within 2–5 business days</p>
          </div>
        </div>
      </div>
    </div>

    <!-- RELATED PRODUCTS -->
    <div class="rel-sec">
      <h3>You May Also Like</h3>
      <div class="rgrid" id="relGrid"><p style="color:var(--txm);font-size:.85rem">Loading...</p></div>
    </div>

    <!-- MOBILE STICKY BAR -->
    ${!oos?`<div class="sticky-bar">
      <div class="sticky-price">৳${Number(p.price).toLocaleString()}</div>
      <button class="sticky-add" onclick="doAdd(false)">Add to Cart</button>
      <button class="sticky-add" style="background:#0D0D0D;flex:0.6" onclick="doAdd(true)">Buy Now</button>
    </div>`:''}
  `;

  // Render related
  const related=allP.filter(x=>x.id!==p.id&&x.category===p.category).slice(0,4);
  if(!related.length){document.getElementById('relGrid').innerHTML='<p style="color:var(--txm);font-size:.85rem;grid-column:1/-1">No related products found.</p>';return}
  document.getElementById('relGrid').innerHTML=related.map(r=>{
    const ri=getImg(r);
    return`<div class="pcard" onclick="location.href='product.html?id=${r.id}'">
      <div class="pc-img"><img src="${ri}" alt="${r.name}" loading="lazy"></div>
      <div class="pc-info"><div class="pc-nm">${r.name}</div><div class="pc-pr2">৳${Number(r.price).toLocaleString()}</div></div>
    </div>`;
  }).join('');
}

/* INIT */
updBadge();
if(!pid){document.getElementById('mainContent').innerHTML='<div class="pg-err">Product not found. <a href="index.html">Go back to shop</a></div>';} 
else{
  fetch(API+'?action=getProducts')
    .then(r=>r.json())
    .then(data=>{
      allP=Array.isArray(data)?data:[];
      const p=allP.find(x=>String(x.id)===String(pid));
      if(!p)document.getElementById('mainContent').innerHTML='<div class="pg-err">Product not found. <a href="index.html">← Back to shop</a></div>';
      else renderProduct(p);
    })
    .catch(()=>{document.getElementById('mainContent').innerHTML='<div class="pg-err">Failed to load product. <a href="index.html">← Back to shop</a></div>';});
}
</script>
</body>
</html>
